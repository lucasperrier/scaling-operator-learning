# Tier 3.3: Widened resolution grid for Diffusion
# Extends from 4 to 10 resolution values: adds R ∈ {16, 48, 96, 192, 384, 512}.
task:
  name: diffusion
  T: 1.0
  domain: [0.0, 6.283185307179586]  # [0, 2*pi]

data:
  n_train_sizes: [50, 100, 200, 500, 1000, 2000, 5000]
  n_test: 1000
  data_seeds: [11, 22, 33]

resolution:
  train_resolutions: [16, 32, 48, 64, 96, 128, 192, 256, 384, 512]
  eval_resolutions: [16, 32, 48, 64, 96, 128, 192, 256, 384, 512]

model:
  activation: gelu

train:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  max_epochs: 5000
  early_stopping_patience: 200
  batch_size: 64
  train_seeds: [101, 202, 303]

out_dir: runs
