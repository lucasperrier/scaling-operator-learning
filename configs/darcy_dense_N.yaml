# Tier 3.1: Densified data axis for Darcy
# Adds N ∈ {150, 300, 750, 3000} to the original grid, yielding 11 points per slice.
task:
  name: darcy
  domain: [0.0, 1.0]

data:
  n_train_sizes: [50, 100, 150, 200, 300, 500, 750, 1000, 2000, 3000, 5000]
  n_test: 1000
  data_seeds: [11, 22, 33]

resolution:
  train_resolutions: [32, 64, 128, 256]
  eval_resolutions: [32, 64, 128, 256, 512]

model:
  activation: gelu

train:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  max_epochs: 5000
  early_stopping_patience: 200
  batch_size: 64
  train_seeds: [101, 202, 303]

out_dir: runs
